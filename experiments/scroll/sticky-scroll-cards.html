<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Scaling Cards | UI Laboratory</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/global-nav.css">
    <style>
        /* 
           CONFIGURATION & DESIGN TOKENS
           Colors: Muted Pastel Palette
        */
        :root {
            --soft-blush: #E8D5D0;
            --muted-sage: #C8D8CC;
            --pale-lavender: #D4C9E3;
            --soft-peach: #F0D9D1;
            --muted-blue: #B8D4E8;
            --soft-cream: #F5F1E8;
            
            --text-dark: #2D2D2D;
            --text-light: #5A5A5A;
            
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--soft-cream);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 
           LAYOUT COMPONENTS
        */
        
        /* Hero Section */
        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--soft-cream);
            position: relative;
            z-index: 10;
        }

        .hero h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 600;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: var(--text-dark);
        }

        .hero p {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3em;
        }

        /* Card Sections */
        .pinned-section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Background colors for variety using the pastel palette */
        .pinned-section:nth-child(2) { background-color: var(--soft-blush); }
        .pinned-section:nth-child(3) { background-color: var(--muted-sage); }
        .pinned-section:nth-child(4) { background-color: var(--pale-lavender); }
        .pinned-section:nth-child(5) { background-color: var(--muted-blue); }

        .card-wrapper {
            width: 80vw;
            height: 80vh;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.05);
            transform-origin: center center;
            will-change: transform;
        }

        .card-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Extra aesthetic: slight zoom in on images */
            scale: 1.1; 
            /* Ensure visibility fallback if Shery.js fails */
            opacity: 1 !important;
            visibility: visible !important;
        }

        .card-info {
            position: absolute;
            bottom: 4rem;
            left: 4rem;
            color: white;
            z-index: 2;
        }

        .card-info h2 {
            font-family: var(--font-display);
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .card-info p {
            font-size: 1rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Overlay to make text readable */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.3));
            pointer-events: none;
        }

        /* Final Scrollable Section */
        .outro {
            width: 100%;
            height: 100vh;
            background-color: var(--soft-cream);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 5;
            position: relative;
        }

        .outro h2 {
            font-family: var(--font-display);
            font-size: 4rem;
            text-transform: uppercase;
        }

        /* Scroll Progress Bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background-color: var(--text-dark);
            z-index: 100;
        }

        /* Custom Scroll Smoothness Wrapper */
        html.lenis {
            height: auto;
        }
        .lenis-smooth {
            scroll-behavior: auto;
        }
    </style>
</head>
<body>

    <div class="progress-bar"></div>

    <main id="main-content">
        <!-- Hero Section -->
        <section class="hero">
            <p>Motion Experiment 04</p>
            <h1>Sticky Scape</h1>
        </section>

        <!-- Pinned Card Sections -->
        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-1.png" alt="Sage Hills">
                <div class="card-info">
                    <h2>Sage Sanctuary</h2>
                    <p>Minimalist rolling hills</p>
                </div>
            </div>
        </section>

        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-2.png" alt="Lavender Abstract">
                <div class="card-info">
                    <h2>Lavender Drift</h2>
                    <p>Organic abstract composition</p>
                </div>
            </div>
        </section>

        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-3.png" alt="Blush Architecture">
                <div class="card-info">
                    <h2>Blush Structure</h2>
                    <p>Architectural geometric detail</p>
                </div>
            </div>
        </section>

        <section class="pinned-section">
            <div class="card-wrapper">
                <div class="overlay"></div>
                <img src="../../assets/images/scroll-pin-4.png" alt="Blue Ocean">
                <div class="card-info">
                    <h2>Azure Calm</h2>
                    <p>Serene ocean horizon</p>
                </div>
            </div>
        </section>

        <!-- Outro Section -->
        <section class="outro">
            <h2>The End</h2>
            <p style="margin-top: 1rem; color: var(--text-light);">Scroll back to relive the experience</p>
        </section>
    </main>

    <!-- 
       CRITICAL LIBS
       Using Free GSAP, Lenis, and Shery.js (WebGL)
    -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.155.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.27/bundled/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sheryjs/dist/Shery.js"></script>
    <script src="../../assets/global-nav.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js"></script>

    <script>
        // --- INITIALIZATION ---
        
        // Register GSAP Plugins
        gsap.registerPlugin(ScrollTrigger, Draggable);

        // Initialize Global Nav
        initGlobalNav('../../');

        // Initialize Shery.js Image Effects
        // NOTE: Shery.js (WebGL) requires a local server to load images correctly.
        // If viewing via file:// protocol, images might not show due to CORS.
        
        const isLocalFile = window.location.protocol === 'file:';
        
        if (!isLocalFile) {
            Shery.imageEffect(".card-wrapper img", {
                style: 2, // Liquid distortion
                config: {
                    "resolutionXY": {"value": 100},
                    "distortion": {"value": 1.5},
                    "mode": {"value": 1},
                    "mousemove": {"value": 0},
                    "scrollPercentage": {"value": 0},
                    "distortionMultiplier": {"value": 1},
                    "noEffectGooey": {"value": true},
                    "onMouse": {"value": 1},
                    "noise_speed": {"value": 0.2},
                    "metaball": {"value": 0.2},
                    "discard_threshold": {"value": 0.5},
                    "antialias_threshold": {"value": 0.002},
                    "grayscale": {"value": 0},
                },
                debug: false 
            });
        } else {
            console.warn("Shery.js WebGL effects are disabled on file:// protocol to ensure image visibility. Please use a local server (like Live Server) for the full effect.");
            // Ensure images stay visible
            gsap.set(".card-wrapper img", { opacity: 1 });
        }

        // Add a premium Mouse Follower
        Shery.mouseFollower({
            skew: true,
            debug: false,
            opacity: 1
        });

        // Make the cards react to mouse hover with a magnetic effect
        Shery.makeMagnet(".card-wrapper", {
            ease: "cubic-bezier(0.23, 1, 0.32, 1)",
            duration: 1
        });

        // Initialize Lenis Smooth Scroll
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            wheelMultiplier: 1,
            infinite: false,
        });

        // Sync Lenis with ScrollTrigger
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => {
            lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0);

        // --- ANIMATION LOGIC ---

        // 1. Hero Section Fade Out
        gsap.to(".hero h1, .hero p", {
            scrollTrigger: {
                trigger: ".hero",
                start: "top top",
                end: "bottom top",
                scrub: true
            },
            opacity: 0,
            y: -100,
            ease: "none"
        });

        // 2. Progress Bar
        gsap.to(".progress-bar", {
            width: "100%",
            ease: "none",
            scrollTrigger: {
                trigger: "#main-content",
                start: "top top",
                end: "bottom bottom",
                scrub: 0.3
            }
        });

        // 3. Pinned & Scaling Cards
        const sections = gsap.utils.toArray(".pinned-section");
        
        sections.forEach((section, index) => {
            const card = section.querySelector(".card-wrapper");
            const image = section.querySelector("img");
            
            // The magic happens here: 
            // - pin: true locks the section to the top
            // - pinSpacing: false allows the next section to overlap
            // - scrub: true links the scale to the scroll progress
            
            ScrollTrigger.create({
                trigger: section,
                start: "top top",
                end: "bottom top", // Keep pinned for 100vh
                pin: true,
                pinSpacing: false,
                scrub: true,
                id: `pin-${index}`
            });

            // Animate scale while scrolling through the pinned duration
            gsap.fromTo(card, 
                { scale: 1 }, 
                {
                    scale: 0.5,
                    opacity: 0.6,
                    ease: "none",
                    scrollTrigger: {
                        trigger: section,
                        start: "top top",
                        end: "bottom top",
                        scrub: true
                    }
                }
            );

            // Subtle image parallax/zoom effect
            gsap.to(image, {
                scale: 1.3,
                ease: "none",
                scrollTrigger: {
                    trigger: section,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: true
                }
            });
        });

        // 4. Outro Reveal
        gsap.from(".outro h2", {
            scrollTrigger: {
                trigger: ".outro",
                start: "top bottom",
                end: "center center",
                scrub: true
            },
            scale: 0.8,
            opacity: 0,
            y: 50
        });

        // Accessibility/Beginner Note in Console
        console.log("%c UI LAB: Sticky Scaling Cards Implementation ACTIVE ", "background: #C8D8CC; color: #2D2D2D; font-weight: bold; padding: 4px;");
        console.log("Steps: 1. Pin section (pin: true), 2. Disable spacing (pinSpacing: false), 3. Scrub scale (from 1 to 0.5).");
    </script>
</body>
</html>
