<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shutter Nav Reveal | UI Laboratory</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/global-nav.css">
    
    <style>
        /* 
           CONFIGURATION & DESIGN TOKENS
           Palette: Achromatic / Neutral (per Guidelines)
        */
        :root {
            --achro-white: #F5F5F0;
            --achro-silver: #E0DDD8;
            --achro-gray: #B0ACA8;
            --achro-charcoal: #2D2D2D;
            --achro-black: #1A1A1A;
            
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            
            --transition-main: cubic-bezier(0.77, 0, 0.175, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--achro-white);
            color: var(--achro-charcoal);
            overflow-x: hidden;
        }

        /* 
           PAGE CONTENT 
        */
        .content-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 5vw;
        }

        .content-hero h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 15vw, 12rem);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        /* 
           SHUTTER MENU OVERLAY 
        */
        .shutter-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9000;
            visibility: visible; /* Prevent blink by being visible by default */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Shutter Grid Layers */
        .shutter-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .shutter-row {
            flex: 1;
            display: flex;
            width: 100%;
        }

        .shutter-block {
            flex: 1;
            height: 100%;
            background-color: var(--achro-charcoal);
            transform: scaleY(1); /* Start CLOSED to prevent blink on reload */
            will-change: transform;
        }

        .shutter-row-1 .shutter-block { transform-origin: top; }
        .shutter-row-2 .shutter-block { transform-origin: bottom; }

        /* Alternate colors for the checkerboard B&W look */
        .shutter-block:nth-child(even) { background-color: var(--achro-black); }
        .shutter-row-2 .shutter-block:nth-child(odd) { background-color: var(--achro-gray); }

        /* Menu Content */
        .menu-content {
            position: relative;
            z-index: 9010;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            overflow: hidden;
            margin: 1.5rem 0;
        }

        .menu-link {
            display: block;
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            color: var(--achro-white);
            text-decoration: none;
            text-transform: uppercase;
            line-height: 1;
            transition: transform 0.4s var(--transition-main), color 0.4s ease;
        }

        .menu-link:hover {
            color: var(--achro-silver);
            transform: skewX(-10deg);
        }

        /* 
           MENU TOGGLE 
        */
        .custom-nav-trigger {
            position: fixed;
            top: 3rem;
            right: 3rem;
            z-index: 9020;
            cursor: pointer;
            padding: 10px;
        }

        .trigger-text {
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--achro-charcoal);
            transition: color 0.4s ease;
        }

        .is-open .trigger-text {
            color: var(--achro-white);
        }

        .trigger-line {
            width: 40px;
            height: 2px;
            background: var(--achro-charcoal);
            margin-top: 8px;
            transition: transform 0.4s var(--transition-main), background 0.4s ease;
        }

        .is-open .trigger-line {
            background: var(--achro-white);
            transform: translateY(-5px) rotate(45deg);
        }
    </style>
</head>
<body>

    <!-- Custom Navigation Trigger -->
    <div class="custom-nav-trigger" id="shutterTrigger">
        <span class="trigger-text" id="triggerLabel">EXPLORE</span>
        <div class="trigger-line" id="triggerLine"></div>
    </div>

    <!-- Shutter Menu Overlay -->
    <div class="shutter-menu" id="shutterMenu">
        
        <!-- Shutter Layers -->
        <div class="shutter-grid">
            <div class="shutter-row shutter-row-1" id="row1"></div>
            <div class="shutter-row shutter-row-2" id="row2"></div>
        </div>

        <!-- Hidden Content Area (empty for now) -->
        <div class="menu-content" id="menuContent"></div>
    </div>

    <!-- Main Page Content -->
    <main>
        <section class="content-hero">
            <p style="text-transform: uppercase; letter-spacing: 5px; font-size: 0.8rem; margin-bottom: 2rem;">B&W Aesthetic / Shutter Reveal</p>
            <h1>MINIMAL<br>ESSENCE</h1>
            <p style="margin-top: 2rem; max-width: 400px; opacity: 0.6; line-height: 1.6;">A high-contrast navigation experience that uses a grid of shutters to reveal the archive.</p>
        </section>
    </main>

    <!-- Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="../../../assets/global-nav.js"></script>

    <script>
        // --- INITIALIZATION ---
        
        // Register Global Nav (Small Adaptive Menu)
        initGlobalNav('../../../');

        const config = {
            blocks: 10,
            duration: 0.8,
            stagger: 0.05,
            ease: "expo.inOut"
        };

        const trigger = document.getElementById('shutterTrigger');
        const menu = document.getElementById('shutterMenu');
        const menuContent = document.getElementById('menuContent');
        const label = document.getElementById('triggerLabel');
        const line = document.getElementById('triggerLine');

        // Create Grid Blocks Dynamically
        const createBlocks = () => {
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            
            for (let i = 0; i < config.blocks; i++) {
                const b1 = document.createElement('div');
                b1.className = 'shutter-block';
                row1.appendChild(b1);

                const b2 = document.createElement('div');
                b2.className = 'shutter-block';
                row2.appendChild(b2);
            }
        };

        createBlocks();
        const blocks = document.querySelectorAll('.shutter-block');

        // Animation Timeline
        let isOpen = false;
        const menuTl = gsap.timeline({ paused: true });

        menuTl.set(menu, { visibility: 'visible' })
            .to(blocks, {
                scaleY: 1,
                duration: config.duration,
                stagger: { each: config.stagger, from: "start" },
                ease: config.ease
            })
            .to(menuContent, {
                opacity: 1,
                y: 0,
                duration: 0.6,
                ease: "power3.out"
            }, "-=0.4")
            .from('.menu-link', {
                y: 50,
                opacity: 0,
                rotate: 5,
                duration: 0.6,
                stagger: 0.05,
                ease: "back.out(1.7)"
            }, "-=0.3");

        // Toggle Handle
        trigger.addEventListener('click', () => {
            if (isOpen) return; // Prevent multiple clicks during animation
            
            isOpen = true;
            trigger.classList.add('is-open');
            label.innerText = "SHUTTERING";

            // 1. Close Shutters
            menuTl.play().then(() => {
                // 2. Brief wait at the peak
                setTimeout(() => {
                    // 3. Open Shutters
                    menuTl.reverse().then(() => {
                        isOpen = false;
                        trigger.classList.remove('is-open');
                        label.innerText = "EXPLORE";
                    });
                }, 400); // Cinematic pause
            });
        });

        // Add auto-open on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Ensure shutters are fully closed before starting the 'open' animation
            gsap.set(blocks, { scaleY: 1 });
            
            // Initial reveal on load
            setTimeout(() => {
                gsap.to(blocks, {
                    scaleY: 0,
                    duration: config.duration,
                    stagger: { each: config.stagger, from: "start" },
                    ease: config.ease,
                    onComplete: () => {
                        gsap.set(menu, { visibility: 'hidden' });
                    }
                });
            }, 500);
        });

        console.log("%c SHUTTER NAV REVEAL ACTIVE ", "background: #1A1A1A; color: #F5F5F0; font-weight: bold; padding: 4px;");
    </script>
</body>
</html>
