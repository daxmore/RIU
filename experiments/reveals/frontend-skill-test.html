<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Skill Test | Premium Reveal</title>
    
    <!-- Google Fonts: Editorial (Playfair) + Modern (Outfit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- GSAP (Free Core) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* 
        ------------------------------------------------------------------
        DESIGN SYSTEM & VARIABLES
        Based on Extended Pastel Palette (Soft Blush & Muted Sage)
        ------------------------------------------------------------------
        */
        :root {
            --bg-color: #E8D5D0;       /* Soft Blush */
            --accent-color: #C8D8CC;   /* Muted Sage */
            --text-main: #4A4A4A;      /* Deep Charcoal (Softened) */
            --text-muted: #888888;     /* Charcoal Blush */
            --white: #F5F5F0;          /* Soft White */
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 
        ------------------------------------------------------------------
        GRAIN OVERLAY (The "Artisanal" Standout Idea)
        ------------------------------------------------------------------
        */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04; /* Very subtle */
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* 
        ------------------------------------------------------------------
        LAYOUT
        ------------------------------------------------------------------
        */
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        /* Editorial Header Styles */
        .title-wrapper {
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            font-weight: 700;
            display: inline-block;
        }

        /* Styling individual characters for GSAP reveal */
        .char {
            display: inline-block;
            transform: translateY(110%);
        }

        .subtitle {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--text-muted);
            max-width: 600px;
            line-height: 1.6;
            margin-bottom: 3rem;
            opacity: 0; /* Animated later */
        }

        /* Magnetic Button Styling */
        .btn-wrapper {
            position: relative;
            cursor: pointer;
        }

        .magnetic-btn {
            padding: 1.2rem 3rem;
            background-color: var(--accent-color);
            color: var(--text-main);
            border: none;
            border-radius: 100px;
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: var(--transition-smooth);
            display: block;
            opacity: 0;
            transform: scale(0.9);
        }

        @media (hover: hover) and (pointer: fine) {
            .magnetic-btn:hover {
                background-color: var(--white);
                transform: scale(1.05);
            }
        }

        /* Back to Index Link */
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 1;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="grain-overlay"></div>
    
    <a href="../../index.html" class="back-link">← Back to Index</a>

    <main class="container">
        <div class="title-wrapper">
            <h1 id="reveal-title">Subtle Precision</h1>
        </div>
        
        <p class="subtitle" id="reveal-subtitle">
            A demonstration of the <strong>Frontend Design</strong> skill. Combining editorial typography, 
            pastel aesthetics, and smooth GSAP reveals without premium plugins.
        </p>

        <div class="btn-wrapper" id="magnetic-area">
            <button class="magnetic-btn" id="reveal-btn">Explore Work</button>
        </div>
    </main>

    <script>
        /* 
        ------------------------------------------------------------------
        TEXT SPLITTING (Free alternative to SplitText)
        ------------------------------------------------------------------
        */
        function splitText(selector) {
            const element = document.querySelector(selector);
            const text = element.innerText;
            element.innerHTML = "";
            
            text.split("").forEach(char => {
                const span = document.createElement("span");
                span.classList.add("char");
                span.innerText = char === " " ? "\u00A0" : char;
                element.appendChild(span);
            });
        }

        /* 
        ------------------------------------------------------------------
        ANIMATION LOGIC
        ------------------------------------------------------------------
        */
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Prepare text for animation
            splitText('#reveal-title');

            const tl = gsap.timeline({ defaults: { ease: "expo.out", duration: 1.5 } });

            // 2. Reveal Sequence
            tl.to('.char', {
                y: 0,
                stagger: 0.05,
                duration: 1.2,
                ease: "power4.out"
            })
            .to('#reveal-subtitle', {
                opacity: 1,
                y: -10,
                duration: 1,
            }, "-=0.8")
            .to('#reveal-btn', {
                opacity: 1,
                scale: 1,
                duration: 0.8,
                ease: "back.out(1.7)"
            }, "-=0.5");

            // 3. Magnetic Hover Effect (Custom Implementation)
            const btnArea = document.querySelector('#magnetic-area');
            const btn = document.querySelector('#reveal-btn');

            if (window.matchMedia("(hover: hover)").matches) {
                btnArea.addEventListener('mousemove', (e) => {
                    const rect = btnArea.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;

                    gsap.to(btn, {
                        x: x * 0.3,
                        y: y * 0.3,
                        duration: 0.4,
                        ease: "power2.out"
                    });
                });

                btnArea.addEventListener('mouseleave', () => {
                    gsap.to(btn, {
                        x: 0,
                        y: 0,
                        duration: 0.6,
                        ease: "elastic.out(1, 0.3)"
                    });
                });
            }
        });
    </script>
</body>
</html>
