<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Synchronized Slider | UI Laboratory</title>

    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../../assets/global-nav.css">

    <!-- GSAP Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="../../../assets/global-nav.js"></script>

    <style>
        /* 
           DESIGN SYSTEM: Noir-Pastel Cinematic Palette
        */
        :root {
            --text-white: #F5F5F0;
            --overlay-dark: rgba(0, 0, 0, 0.4);
            --accent-glow: #F5CBA7;

            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;

            --slide-duration: 6000ms;
            /* 6 seconds */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: #000;
            color: var(--text-white);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            /* Outer Margin */
        }

        /* --- SLIDER CORE --- */
        .slider-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            /* Rounded frame */
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        /* Background Layer */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            visibility: hidden;
            transform: scale(1.1);
            /* Subtle zoom for cinematic reveal */
            will-change: transform, opacity;
        }

        .bg-slide.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Content Layer */
        .content-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10vw;
            pointer-events: none;
        }

        .mask {
            overflow: hidden;
            display: block;
        }

        .subtitle {
            font-size: 1.2rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 3rem;
            color: var(--accent-glow);
            transform: translateY(100%);
            opacity: 0;
        }

        .title {
            font-family: var(--font-display);
            font-size: clamp(3rem, 12vw, 10rem);
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
            color: #fff;
        }

        .title-line {
            display: block;
            padding: 0.15em 0;
            transform: translateY(100%);
        }

        .testimonial-box {
            max-width: 450px;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-left: 2px solid var(--accent-glow);
            transform: translateX(-50px);
            opacity: 0;
            visibility: hidden;
        }

        .testimonial-text {
            font-size: 1.1rem;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 1rem;
            font-weight: 300;
        }

        .testimonial-author {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* Navigation Controls */
        .ui-layer {
            position: absolute;
            bottom: 5vh;
            left: 10vw;
            width: 80vw;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 100;
        }

        .nav-arrows {
            display: flex;
            gap: 1rem;
            pointer-events: auto;
        }

        .arrow {
            width: 60px;
            height: 60px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #fff;
        }

        .arrow:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .progress-indicator {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            margin-bottom: 25px;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-glow);
        }

        .slide-counter {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 900;
            opacity: 0.1;
            line-height: 1;
        }

        /* Responive Audit */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .slider-wrapper {
                border-radius: 12px;
            }

            .content-container {
                padding: 0 5vw;
            }

            .ui-layer {
                bottom: 8vh;
                flex-direction: column;
                align-items: center;
                gap: 2rem;
            }

            .slide-counter {
                order: -1;
            }

            .testimonial-box {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="slider-wrapper">
        <!-- BACKGROUND LAYER -->
        <div class="bg-container" id="bgContainer">
            <div class="bg-slide active" style="background-image: url('../../../assets/images/cinematic-slide-1.png')">
            </div>
            <div class="bg-slide" style="background-image: url('../../../assets/images/cinematic-slide-2.png')"></div>
            <div class="bg-slide" style="background-image: url('../../../assets/images/cinematic-slide-3.png')"></div>
            <div class="bg-slide" style="background-image: url('../../../assets/images/cinematic-slide-4.png')"></div>
            <div class="bg-slide" style="background-image: url('../../../assets/images/cinematic-slide-5.png')"></div>
            <div class="vignette"></div>
        </div>

        <!-- CONTENT LAYER -->
        <div class="content-container">
            <div class="mask">
                <p class="subtitle" id="subtitle">The Glacial Sanctuary</p>
            </div>
            <h1 class="title" id="title">
                <span class="mask"><span class="title-line">Ethereal</span></span>
                <span class="mask"><span class="title-line">Visions</span></span>
            </h1>

            <div class="testimonial-box" id="testimonial">
                <p class="testimonial-text">"An unparalleled immersion into architectural serenity. The light here
                    breathes."</p>
                <p class="testimonial-author">&mdash; Elena Frost, Architect</p>
            </div>
        </div>

        <!-- UI LAYER -->
        <div class="ui-layer">
            <div class="controls-left">
                <div class="progress-indicator">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="nav-arrows">
                    <button class="arrow" id="prevBtn">&larr;</button>
                    <button class="arrow" id="nextBtn">&rarr;</button>
                </div>
            </div>

            <div class="slide-counter" id="counter">01</div>
        </div>
    </div>

    <script>
        // --- DATA CONFIG ---
        const slides = [
            {
                subtitle: 'The Glacial Sanctuary',
                title1: 'Ethereal',
                title2: 'Visions',
                testimonial: '"An unparalleled immersion into architectural serenity. The light here breathes."',
                author: 'Elena Frost, Architect',
                accent: '#C4DCF0'
            },
            {
                subtitle: 'Zen Meditation',
                title1: 'Organic',
                title2: 'Harmony',
                testimonial: '"Finding silence in the desaturated tones of the earth. Pure grounded energy."',
                author: 'Mento Kaito, Zen Master',
                accent: '#C4CCAA'
            },
            {
                subtitle: 'Golden Hour Library',
                title1: 'Timeless',
                title2: 'Stories',
                testimonial: '"The warmth of the amber light makes every page feel like a lost secret."',
                author: 'Julian Moore, Author',
                accent: '#F5CBA7'
            },
            {
                subtitle: 'Neon Gallery',
                title1: 'Vibrant',
                title2: 'Pulse',
                testimonial: '"Art that doesn\'t just sit there—it vibrates with electric pastel life."',
                author: 'Sasha Pink, Curator',
                accent: '#F5A8C0'
            },
            {
                subtitle: 'Whisper Chamber',
                title1: 'Dreamy',
                title2: 'Silence',
                testimonial: '"A haze of lavender and pink where time simply refuses to exist."',
                author: 'Mina Haze, Designer',
                accent: '#F5EBE8'
            }
        ];

        // --- STATE ---
        let currentIndex = 0;
        let isAnimating = false;
        let autoplayTimer;

        // --- DOM ---
        const bgSlides = document.querySelectorAll('.bg-slide');
        const subtitle = document.getElementById('subtitle');
        const titleLines = document.querySelectorAll('.title-line');
        const testimonial = document.getElementById('testimonial');
        const testimonialText = testimonial.querySelector('.testimonial-text');
        const testimonialAuthor = testimonial.querySelector('.testimonial-author');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');

        // --- INIT ---
        initGlobalNav('../../../');
        startAutoplay();
        animateSlide(0, true); // Initial entrance

        // --- NAVIGATION ---
        document.getElementById('nextBtn').addEventListener('click', () => {
            if (isAnimating) return;
            nextSlide();
            resetAutoplay();
        });

        document.getElementById('prevBtn').addEventListener('click', () => {
            if (isAnimating) return;
            prevSlide();
            resetAutoplay();
        });

        function nextSlide() {
            let nextIndex = (currentIndex + 1) % slides.length;
            animateSlide(nextIndex);
        }

        function prevSlide() {
            let nextIndex = (currentIndex - 1 + slides.length) % slides.length;
            animateSlide(nextIndex);
        }

        // --- ANIMATION CORE ---
        function animateSlide(index, isFirst = false) {
            isAnimating = true;
            const data = slides[index];

            const tl = gsap.timeline({
                onComplete: () => {
                    isAnimating = false;
                    currentIndex = index;
                }
            });

            // 1. Exit Current (if not first)
            if (!isFirst) {
                tl.to([subtitle, titleLines, testimonial], {
                    yPercent: -100,
                    opacity: 0,
                    duration: 0.8,
                    ease: "power2.in"
                });

                tl.to(bgSlides[currentIndex], {
                    opacity: 0,
                    scale: 1.1,
                    duration: 1,
                    onComplete: () => gsap.set(bgSlides[currentIndex], { visibility: 'hidden' })
                }, 0.4);
            }

            // 2. Set New Data
            tl.add(() => {
                subtitle.innerText = data.subtitle;
                titleLines[0].innerText = data.title1;
                titleLines[1].innerText = data.title2;
                testimonialText.innerText = data.testimonial;
                testimonialAuthor.innerText = "— " + data.author;
                counter.innerText = (index + 1) < 10 ? `0${index + 1}` : index + 1;
                document.documentElement.style.setProperty('--accent-glow', data.accent);

                bgSlides[index].style.visibility = 'visible';
            });

            // 3. Enter New
            tl.fromTo(bgSlides[index], { opacity: 0, scale: 1.1 }, {
                opacity: 1,
                scale: 1,
                duration: 1.5,
                ease: "power2.out"
            }, 0.8);

            tl.fromTo(subtitle, { yPercent: 100, opacity: 0 }, {
                yPercent: 0,
                opacity: 1,
                duration: 1,
                ease: "power3.out"
            }, 1.2);

            tl.fromTo(titleLines, { yPercent: 100 }, {
                yPercent: 0,
                stagger: 0.1,
                duration: 1.2,
                ease: "power4.out"
            }, 1.3);

            tl.fromTo(testimonial, { x: -50, opacity: 0, visibility: 'hidden' }, {
                x: 0,
                opacity: 1,
                visibility: 'visible',
                duration: 1,
                ease: "power2.out"
            }, 1.5);

            // Progress Bar Reset
            gsap.set(progressBar, { width: 0 });
            gsap.to(progressBar, { width: "100%", duration: 6, ease: "none" });
        }

        // --- AUTOPLAY ---
        function startAutoplay() {
            autoplayTimer = setInterval(nextSlide, 6000 + 2000); // 6s pause + ~2s animation buffer
        }

        function resetAutoplay() {
            clearInterval(autoplayTimer);
            startAutoplay();
        }

    </script>
</body>

</html>
